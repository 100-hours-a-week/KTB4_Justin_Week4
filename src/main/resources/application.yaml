spring:
  application:
    name: community
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:h2:mem:community
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true

app:
  base-url: http://localhost:8080
  upload-dir: uploads

jwt:
  secret-key: very-very-long-and-super-secret-key
  access-token-expiration: 1800000